# FEAT: better git diffs
gui:
  enlargedSideViewLocation: top
  nerdFontsVersion: "3"
  spinner:
    frames:
      - "◜"
      - "◠"
      - "◝"
      - "◞"
      - "◡"
      - "◟"

git:
  autoFetch: false
  commit:
    autoWrapWidth: 80
  log:
    showGraph: when-maximised
  parseEmoji: true

os:
  editPreset: nvim

notARepository: quit
promptToReturnFromSubprocess: false

keybinding:
  universal:
    gotoTop: "<"
    gotoBottom: ">"
    prevBlock: ["<left>", "h"]
    nextBlock: ["<right>", "l"]
    redo: "<ctrl+z>"
  commits:
    moveDownCommit: "<ctrl+j>"
    moveUpCommit: "<ctrl+k>"
