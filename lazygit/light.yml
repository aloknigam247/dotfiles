gui:
  authorColors: { "Alok Nigam": "#7287FD" }
  branchColors: { "master": "#179299", "main": "#179299" }
  theme:
    activeBorderColor:
      - "#D20F39"
      - bold
    inactiveBorderColor:
      - "#6C6F85"
    optionsTextColor:
      - "#1E66F5"
    selectedLineBgColor:
      - "#CCD0DA"
    cherryPickedCommitBgColor:
      - "#BCC0CC"
    cherryPickedCommitFgColor:
      - "#D20F39"
    unstagedChangesColor:
      - "#D20F39"
    defaultFgColor:
      - "#4C4F69"
    searchingActiveBorderColor:
      - "#DF8E1D"

git:
  branchLogCmd: 'git log --color=always --pretty=\"%C(#1E66F5) %C(#04A5E5)%h %Creset- %C(#40A02B) %s %C(#179299)󰔟 %ar on %ah %C(#DC8A78)<%C(#D20F39)%an %C(#DD7878) %ae%C(#DC8A78)>%C(#FE640B)%d\" {{branchName}} --'
